# SYN-001 authored ground truth: fate of each provision under a GMRA 1995 -> 2011 upgrade.
# Source: fde-positioning doc 15 (SYN-001 exemplar), anchored to the sourced upgrade table
# in doc 12. Status: AWAITING DESK VALIDATION — nothing here is validated ground truth yet.
#
# Fate vocabulary (from the source docs' classification: "carries over / conflicts /
# renegotiate / silently lost"):
#   carries-over   : provision survives the upgrade, possibly with re-anchoring
#   conflict       : provision overlaps/collides with a 2011 standard provision; explicit choice needed
#   renegotiate    : provision cannot operate as written post-upgrade; must be redrafted
#   silently-lost  : the 1995 default the parties relied on flips on upgrade with no drafting
# Rough mapping to a retained/amended/superseded/new-needed scheme:
#   carries-over ~ retained; renegotiate ~ amended; conflict ~ superseded-or-amended (choice);
#   silently-lost ~ new-provision-needed (an election/provision must be affirmatively added).
#
# `category` values are derived from the provision names in doc 15 (the source does not
# define a category taxonomy) — treat the taxonomy itself as TBD-validation.

corpus_id: SYN-001
upgrade_pair: "GMRA 1995 -> GMRA 2011"
status: AWAITING DESK VALIDATION
authored: "2026-07-07 (doc 15), against the sourced upgrade table in doc 12"

provisions:
  - id: P1
    agreement_ref: "Part 2(a)"
    name: Default valuation rider
    category: default-valuation
    present_in_agreement: true
    fate: renegotiate
    severity: high
    reasoning: >
      An Express Provision under Protocol logic (bespoke DMV procedure — PROT 1.12(a)):
      preserved, not upgraded. But it is keyed to two concepts the 2011 text deletes
      (Default Valuation Time; the Default Valuation Notice requirement — doc 12 table
      row 4), so preservation strands it: deadlines anchored to a defined term that no
      longer exists. The naive upgrade "preserves" a provision that can no longer operate
      as written. This is the exemplar's centrepiece conflict.
    sources: ["PROT 1.12(a)", "doc 12 row 4", "CC-2011 §§10(d)-(f)", "GN-2011 §C para 10"]

  - id: P2
    agreement_ref: "Part 2(b)"
    name: Modified Act of Insolvency
    category: act-of-insolvency
    present_in_agreement: true
    fate: renegotiate
    severity: critical
    cascade_flag: true
    cascade_reasoning: >
      Under Protocol para 1.13, ANY modification to the Act of Insolvency EoD switches
      off virtually the entire close-out amendment package (doc 12 table row 2). The
      collision is not local to this clause — one markup made in 2003 silently disables
      the 2011 close-out modernisation everywhere else. A reviewer that classifies P2 as
      a self-contained "renegotiate" without flagging the cascade scores a partial miss.
    reasoning: >
      Bespoke 30-day petition window plus a deleted "composition with creditors" limb
      conflicts limb-by-limb with the widened 2011 Act of Insolvency definition; the
      Protocol treats any modification of this EoD as high-consequence (para 1.13).
    sources: ["PROT 1.13", "doc 12 row 2", "CC-2011 §2 'Act of Insolvency'"]

  - id: P3
    agreement_ref: "Part 2(c)"
    name: Payment-default grace period
    category: grace-period
    present_in_agreement: true
    fate: carries-over
    severity: low
    reasoning: >
      Grace-period riders are preserved mutatis mutandis (PROT 1.11; doc 12 row 1). The
      mutatis mutandis is the nuance: the 2011 sequence (event = EoD; notice designates
      an Early Termination Date within 20 days) changes what the grace period delays.
      Correct output: carries over, restated against the ETD mechanics.
    sources: ["PROT 1.11", "doc 12 row 1"]

  - id: P4
    agreement_ref: "Part 2(d)"
    name: Set-off rider
    category: set-off
    present_in_agreement: true
    fate: conflict
    severity: high
    reasoning: >
      Duplication conflict. 2011 introduces standard para 10(n) close-out set-off (doc 12
      row 9): mutual in availability (NDP's option), party-to-party only, including
      contingent amounts. The bespoke rider is broader (affiliates), one-way, and not
      limited to close-out. If both survive, two overlapping set-off regimes coexist —
      interpretive risk at default. Correct classification: conflict requiring an
      explicit choice, and (per the anti-optionality rule R11 lens) a likely fund
      push-back moment on the one-way breadth.
    sources: ["doc 12 row 9", "CC-2011 §10(n)", "PROT Annex 3"]

  - id: P5
    agreement_ref: null   # deliberate absence: the agreement is silent — see absent_provisions A1
    name: Silence on automatic close-out
    category: automatic-early-termination
    present_in_agreement: false
    fate: silently-lost
    severity: critical
    reasoning: >
      The canonical silent fate (doc 12 row 3): the 1995 doc relies on the 1995 default —
      winding-up petition triggers automatic close-out. 2011 flips the default: automatic
      termination only if AET is elected in Annex I. An upgrade that doesn't affirmatively
      make the AET election changes insolvency outcomes without a word of drafting. The
      eval scores this as the mandatory "found the invisible change" item; a reviewer that
      only analyses provisions that EXIST will miss it, which is the point.
    sources: ["doc 12 row 3", "CC-2011 §10(a),(b)", "GN-2011 §C para 10"]

  - id: P6
    agreement_ref: "Part 2(e)"
    name: Fish-or-cut-bait rider
    category: condition-precedent-focb
    present_in_agreement: true
    fate: renegotiate
    severity: medium-high
    reasoning: >
      Two collisions. (i) The 1995 doc predates para 6(j) entirely; on upgrade, if 6(j)
      is elected the rider and the standard condition-precedent must be reconciled or
      they stack (doc 12 row 7). (ii) The rider's clock runs from notice under 1995
      mechanics naming fax/telex; 2011 reworks notices (doc 12 row 13), so the trigger's
      delivery route needs re-keying. Bonus nuance: this provision family is publicly
      documented (HFLR/Retsinas) — rationale grading can cite it.
    sources: ["doc 12 rows 7 and 13", "HFLR (Retsinas 2020)", "GN-2000 Exh. I", "CC-2011 §6, §14"]

  - id: P7
    agreement_ref: "Part 2(f)"
    name: Default interest rider
    category: default-interest
    present_in_agreement: true
    fate: renegotiate
    severity: medium
    reasoning: >
      Stranded twice over (doc 12 row 10): LIBOR ceased; 2011 replaced the concept with
      the Applicable Rate and Protocol Annex 5 exists precisely to retrofit. Correct
      output re-expresses the spread over the Applicable Rate framework and flags the
      IBOR-transition history.
    sources: ["doc 12 row 10", "CC-2011 §§2, 10(g), 12", "PROT 1.6 & Annex 5"]

  - id: P8
    agreement_ref: "Part 2(g)"
    name: Substitution pre-agreement
    category: substitution
    present_in_agreement: true
    fate: carries-over
    severity: low
    reasoning: >
      The control row. Substitution stays consent-based across versions; 2011 only
      clarifies margin-security valuation timing (doc 12 row 12). Every eval needs clean
      carry-overs so the metric can distinguish a reviewer that flags everything
      (precision failure) from one that discriminates.
    sources: ["doc 12 row 12", "CC-2011 §8", "GN-2011 §C para 8", "ERCC 3.51"]

amendment_letters:
  - id: AL1
    agreement_ref: "Amendment Letter No. 1 (2005)"
    name: Margin schedule
    category: margin
    fate: renegotiate
    severity: TBD-validation   # doc 15 gives the interplay but no explicit severity grade
    reasoning: >
      Upgrade interplay (doc 12 row 8): 2011's Method A/B Transaction Exposure election
      must be made; carrying the bespoke schedule into a Method A world double-counts if
      Margin Ratios are also stated. Consolidation task: what is the operative margin
      position TODAY (answer: AL1 schedule, superseding Annex I) — and what must it
      become post-upgrade (a Method B haircut election restating AL1's tiers).
    sources: ["doc 12 row 8", "CC-2011 §§2, 4", "ERCC 2.146, 3.49, 3.60"]

  - id: AL2
    agreement_ref: "Amendment Letter No. 2 (2013)"
    name: Fails rider
    category: fails
    fate: renegotiate
    severity: TBD-validation   # doc 15 gives the interplay but no explicit severity grade
    reasoning: >
      Upgrade interplay (doc 12 rows 5-6): maps onto the 2011 para 10(a)(ii) election
      (fails-as-EoD, if elected) and the standardised mini close-out (para 10(i)); the
      bespoke rider partially duplicates both. Correct output: renegotiate into the
      standard election + mini close-out, noting the rolling-90-day trigger has no
      standard home and must be an express carve-in if wanted.
    sources: ["doc 12 rows 5-6", "GN-2000 Exh. I", "CC-2011 §10(a), §10(i)", "ERCC 4.11-4.14"]

# Things a 1995 agreement lacks that the upgrade must affirmatively address.
# Ground truth for the absent-provision detection task. Failing to flag = miss;
# flagging a provision not on this list = false positive.
absent_provisions:
  - id: A1
    name: Automatic Early Termination election (2011 para 10(b))
    linked_item: P5
    severity: critical
    reasoning: >
      1995 default = automatic close-out on winding-up petition; 2011 default = no AET
      unless elected in Annex I. The election must be affirmatively considered/made or
      insolvency outcomes change silently.
    sources: ["doc 12 row 3"]
  - id: A2
    name: Transaction Exposure method election (Method A/B, 2011 para 2)
    linked_item: AL1
    severity: TBD-validation
    reasoning: >
      The 1995 doc (as amended by AL1's haircut schedule) has no Method A/B election to
      make; on upgrade the election must be made, and AL1's tiers restated as a Method B
      haircut election to avoid double-counting against Margin Ratios.
    sources: ["doc 12 row 8"]
  - id: A3
    name: Failure-to-deliver EoD election (2011 para 10(a)(ii))
    linked_item: AL2
    severity: TBD-validation
    reasoning: >
      1995 has no fails-as-EoD election to make (noted in Annex I: "no elections beyond
      standard"). The AL2 fails rider must be mapped onto the Annex I election and the
      2011 "standard settlement time" qualifier; if the election is simply never made,
      fails silently move from bespoke treatment to non-default.
    sources: ["doc 12 row 5", "doc 15 Annex I seed note"]
  - id: A4
    name: Condition precedent para 6(j) election decision
    linked_item: P6
    severity: TBD-validation
    reasoning: >
      The 1995 doc predates 6(j) entirely. On upgrade the parties must decide whether to
      elect 6(j); if elected, the FOCB rider (P6) and the standard condition-precedent
      must be reconciled or they stack.
    sources: ["doc 12 row 7"]
  - id: A5
    name: Applicable Rate / IBOR retrofit (Protocol Annex 5)
    linked_item: P7
    severity: TBD-validation
    reasoning: >
      Annex I references GBP LIBOR flat for Cash Margin interest and the P7 rider
      hard-codes LIBOR + ISMA conventions; the upgrade must re-express rate references
      against the 2011 Applicable Rate framework (Protocol Annex 5 exists precisely to
      retrofit this into 1995/2000 docs).
    sources: ["doc 12 row 10", "PROT 1.6 & Annex 5"]
  - id: A6
    name: Notice routes re-keying (2011 para 14)
    linked_item: P6
    severity: TBD-validation
    reasoning: >
      Annex I lists telex and fax routes; 2011 deletes telex, adds electronic
      messaging/email, and reworks default-notice references around the ETD concept.
      Bespoke notice-triggered clocks (the P6 FOCB rider) need re-keying.
    sources: ["doc 12 row 13"]

scoring_notes:
  scoreable_items: >
    11 scoreable items per doc 15: P1-P8 fates + P2's cascade flag + P5's invisible
    default-flip (counted within P5's fate) + AL1/AL2 interplays. Missed-conflict rate
    weights P2-cascade and P5 double — they are the expensive failures a human desk
    existed to catch.
  double_weighted: ["P2-cascade", "P5"]
  rationale_grading: >
    LLM-judge anchors: PROT 1.10-1.13 logic for P1/P2/P3; doc 12 row citations for the
    rest.
  corpus_balance: >
    SYN-001 is deliberately conflict-dense; the corpus needs 2-3 mostly-clean siblings
    so the eval punishes over-flagging (SYN-002 candidate: pension fund via agent,
    Agency Annex fact pattern — doc 12 row 17).
  note_on_absent_list: >
    Doc 15 explicitly authors only the P5/AET absence as a scoreable invisible item.
    A2-A6 are derived from doc 15's seed notes and AL interplays plus doc 12's table;
    their severities and their membership in the absent-provision ground truth are
    TBD-validation.
